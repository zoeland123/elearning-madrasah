<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Pentagon -->
  <polygon points="100,10 190,75 160,170 40,170 10,75" fill="#2d5016" stroke="#ffd700" stroke-width="8"/>
  
  <!-- Book -->
  <g transform="translate(100, 90)">
    <path d="M -25,-15 L -25,15 L 0,20 L 25,15 L 25,-15 L 0,-20 Z" fill="#ffd700"/>
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#2d5016" stroke-width="2"/>
    <line x1="-20" y1="-10" x2="-5" y2="-10" stroke="#2d5016" stroke-width="1"/>
    <line x1="-20" y1="-5" x2="-5" y2="-5" stroke="#2d5016" stroke-width="1"/>
    <line x1="-20" y1="0" x2="-5" y2="0" stroke="#2d5016" stroke-width="1"/>
    <line x1="5" y1="-10" x2="20" y2="-10" stroke="#2d5016" stroke-width="1"/>
    <line x1="5" y1="-5" x2="20" y2="-5" stroke="#2d5016" stroke-width="1"/>
    <line x1="5" y1="0" x2="20" y2="0" stroke="#2d5016" stroke-width="1"/>
  </g>
  
  <!-- Star -->
  <polygon points="100,30 105,45 120,45 108,55 113,70 100,60 87,70 92,55 80,45 95,45" fill="#ffd700"/>
  
  <!-- Cotton Plant (left) -->
  <g transform="translate(50, 80)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#ffffff" stroke-width="2"/>
    <circle cx="-5" cy="10" r="4" fill="#ffffff"/>
    <circle cx="5" cy="15" r="4" fill="#ffffff"/>
    <circle cx="-5" cy="20" r="4" fill="#ffffff"/>
    <circle cx="5" cy="25" r="4" fill="#ffffff"/>
    <circle cx="-5" cy="30" r="4" fill="#ffffff"/>
  </g>
  
  <!-- Wheat (right) -->
  <g transform="translate(150, 80)">
    <line x1="0" y1="0" x2="0" y2="50" stroke="#ffd700" stroke-width="2"/>
    <ellipse cx="0" cy="10" rx="3" ry="6" fill="#ffd700"/>
    <ellipse cx="0" cy="18" rx="3" ry="6" fill="#ffd700"/>
    <ellipse cx="0" cy="26" rx="3" ry="6" fill="#ffd700"/>
    <ellipse cx="0" cy="34" rx="3" ry="6" fill="#ffd700"/>
    <ellipse cx="0" cy="42" rx="3" ry="6" fill="#ffd700"/>
  </g>
  
  <!-- Banner -->
  <path d="M 40,150 L 160,150 L 155,165 L 100,160 L 45,165 Z" fill="#ffffff" stroke="#2d5016" stroke-width="2"/>
  <text x="100" y="162" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d5016" text-anchor="middle">IKHLAS BERAMAL</text>
</svg>
