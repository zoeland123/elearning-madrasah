services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elearning_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    networks:
      - elearning_network

  nginx:
    image: nginx:alpine
    container_name: elearning_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - elearning_network

networks:
  elearning_network:
    driver: bridge
